services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: construction_dw
      POSTGRES_USER: construction
      POSTGRES_PASSWORD: construction_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construction -d construction_dw"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  postgres_data:

