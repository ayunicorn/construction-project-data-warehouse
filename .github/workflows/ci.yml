name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: construction_test
          POSTGRES_USER: construction
          POSTGRES_PASSWORD: construction_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U construction -d construction_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://construction:construction_test_password@localhost:5432/construction_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -m "not integration"
      - run: pytest -m integration --no-cov

